<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralGen V2.4 - Typography Fixed</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        display: ['Bebas Neue', 'cursive'],
                    },
                }
            }
        }
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        
        .slide-input-card.active {
            border-color: #6366f1;
            background-color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.1);
        }

        @media (max-width: 1024px) {
            .mobile-bottom-panel { height: 48vh; }
            .preview-container { height: 52vh; }
        }

        #capture-node {
            aspect-ratio: 1 / 1;
            max-width: 100%;
            max-height: 100%;
            touch-action: pan-y;
        }

        /* Typography Classes */
        .font-modern { font-family: 'Plus Jakarta Sans', sans-serif; text-transform: uppercase; letter-spacing: -0.05em; line-height: 0.9; font-weight: 800; }
        .font-elegant { font-family: 'Playfair Display', serif; font-style: italic; line-height: 1.1; font-weight: 700; }
        .font-impact { font-family: 'Bebas Neue', cursive; line-height: 0.85; letter-spacing: 0.02em; font-weight: 400; text-transform: uppercase; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 h-screen w-full flex flex-col lg:flex-row overflow-hidden font-sans">

    <!-- HEADER (Mobile) -->
    <header class="lg:hidden bg-white border-b border-slate-200 px-5 py-3 flex justify-between items-center z-50">
        <h1 class="text-md font-black text-slate-900 flex items-center gap-2">
            <span class="w-7 h-7 rounded-lg bg-indigo-600 flex items-center justify-center text-white text-[10px]">
                <i class="fa-solid fa-font"></i>
            </span>
            ViralGen <span class="text-indigo-500 font-bold">2.4</span>
        </h1>
        <button onclick="downloadAllSlides()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest shadow-lg shadow-indigo-100">
            Ekspor
        </button>
    </header>

    <!-- PREVIEW AREA -->
    <main class="preview-container flex-1 relative flex flex-col items-center justify-center p-4 lg:p-12 overflow-hidden bg-slate-100/50 lg:order-2">
        <div class="relative w-full h-full flex items-center justify-center max-w-xl mx-auto">
            
            <div id="capture-node" class="relative bg-white flex flex-col overflow-hidden shadow-2xl transition-all duration-300 w-full max-w-[90vw] sm:max-w-[500px]">
                <div id="preview-bg-layer" class="absolute inset-0 z-0"></div>
                
                <div class="absolute top-4 right-4 z-50" id="counter-badge">
                    <div class="bg-black/20 backdrop-blur-md border border-white/20 text-white font-black text-[10px] px-3 py-1.5 rounded-lg" id="slide-top-counter">1 / 3</div>
                </div>

                <div id="slide-content-container" class="absolute inset-0 z-20 flex flex-col pointer-events-none p-10 sm:p-14"></div>

                <div id="footer-branding" class="absolute bottom-0 left-0 w-full z-50 h-24 px-8 sm:px-12 flex items-center justify-between pointer-events-none">
                    <div class="flex items-center gap-3 bg-white/10 backdrop-blur-lg border border-white/30 pl-1.5 pr-4 py-1.5 rounded-full">
                        <div id="footer-avatar-container" class="w-8 h-8 rounded-full bg-slate-200 overflow-hidden border-2 border-white flex items-center justify-center"></div>
                        <span id="preview-author" class="font-black text-[10px] sm:text-xs">@username</span>
                    </div>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-2 z-[60] pointer-events-none">
                <button onclick="prevSlide()" class="pointer-events-auto w-10 h-10 bg-white/90 text-slate-900 rounded-full flex items-center justify-center shadow-xl border border-slate-100">
                    <i class="fa-solid fa-chevron-left text-xs"></i>
                </button>
                <button onclick="nextSlide()" class="pointer-events-auto w-10 h-10 bg-white/90 text-slate-900 rounded-full flex items-center justify-center shadow-xl border border-slate-100">
                    <i class="fa-solid fa-chevron-right text-xs"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- CONTROL PANEL -->
    <aside class="mobile-bottom-panel lg:h-screen w-full lg:w-[450px] bg-white border-t lg:border-t-0 lg:border-r border-slate-200 flex flex-col overflow-hidden relative z-40 lg:order-1">
        
        <!-- Tab Buttons -->
        <div class="flex border-b border-slate-100 bg-white">
            <button onclick="switchTab('content')" id="tab-content-btn" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-indigo-600 border-b-2 border-indigo-600 transition-all">Konten</button>
            <button onclick="switchTab('style')" id="tab-style-btn" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400 border-b-2 border-transparent transition-all">Desain & Tema</button>
        </div>

        <div class="flex-1 overflow-y-auto" id="sidebar-scroll">
            
            <!-- SECTION: STYLE (DIATUR DISPLAY BLOCK/HIDDEN VIA JS) -->
            <div id="section-style" class="hidden p-6 lg:p-8 space-y-8">
                <div class="space-y-4">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Tema Tipografi</label>
                    <div class="grid grid-cols-1 gap-2">
                        <button onclick="setTheme('modern')" data-theme="modern" class="theme-btn active flex items-center justify-between px-5 py-4 rounded-xl border-2 border-indigo-600 bg-indigo-50 transition-all">
                            <span class="font-black text-indigo-600 text-sm font-sans tracking-tighter">MODERN SANS</span>
                            <i class="fa-solid fa-check-circle text-indigo-600"></i>
                        </button>
                        <button onclick="setTheme('elegant')" data-theme="elegant" class="theme-btn flex items-center justify-between px-5 py-4 rounded-xl border-2 border-slate-100 bg-white transition-all">
                            <span class="font-bold text-slate-400 text-sm font-serif italic">Elegant Serif</span>
                            <i class="fa-solid fa-circle text-slate-100"></i>
                        </button>
                        <button onclick="setTheme('impact')" data-theme="impact" class="theme-btn flex items-center justify-between px-5 py-4 rounded-xl border-2 border-slate-100 bg-white transition-all">
                            <span class="font-normal text-slate-400 text-lg font-display tracking-wide">IMPACT DISPLAY</span>
                            <i class="fa-solid fa-circle text-slate-100"></i>
                        </button>
                    </div>
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Identitas</label>
                    <div class="flex gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                        <div class="relative w-14 h-14 rounded-xl bg-white border-2 border-dashed border-slate-200 overflow-hidden flex-shrink-0 flex items-center justify-center">
                            <img id="avatar-preview" src="" class="w-full h-full object-cover hidden">
                            <i id="avatar-placeholder" class="fa-solid fa-camera text-slate-300"></i>
                            <input type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="uploadAvatar(this)">
                        </div>
                        <input type="text" id="input-author" placeholder="username" class="flex-1 bg-white border border-slate-200 text-sm rounded-xl px-4 outline-none focus:border-indigo-500">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-2">
                        <span class="text-[9px] text-slate-400 uppercase font-black">Background</span>
                        <div class="h-12 w-full bg-slate-50 border border-slate-200 rounded-xl relative flex items-center px-3 gap-2 overflow-hidden">
                            <div id="preview-bg-dot" class="w-6 h-6 rounded border border-white shadow-sm" style="background-color: #ffffff;"></div>
                            <span id="bg-hex-text" class="text-[10px] font-mono">#FFFFFF</span>
                            <input type="color" id="input-bg-color" value="#ffffff" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <span class="text-[9px] text-slate-400 uppercase font-black">Teks</span>
                        <div class="h-12 w-full bg-slate-50 border border-slate-200 rounded-xl relative flex items-center px-3 gap-2 overflow-hidden">
                            <div id="preview-text-dot" class="w-6 h-6 rounded border border-white shadow-sm" style="background-color: #0f172a;"></div>
                            <span id="text-hex-text" class="text-[10px] font-mono">#0F172A</span>
                            <input type="color" id="input-text-color" value="#0f172a" class="absolute inset-0 opacity-0 cursor-pointer w-full h-full">
                        </div>
                    </div>
                </div>
            </div>

            <!-- SECTION: CONTENT -->
            <div id="section-content" class="p-6 lg:p-8 space-y-6">
                <div id="slides-inputs-container" class="space-y-4"></div>
                <button onclick="addNewSlide()" class="w-full py-4 border-2 border-dashed border-slate-200 bg-slate-50 rounded-xl text-[10px] font-black text-slate-400 hover:text-indigo-600 transition-all uppercase">
                    + Tambah Slide
                </button>
            </div>
        </div>

        <div class="hidden lg:block p-8 border-t border-slate-100">
            <button onclick="downloadAllSlides()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest">
                Simpan Semua (PNG)
            </button>
        </div>
    </aside>

    <div id="loading-overlay" class="fixed inset-0 bg-white/95 backdrop-blur-md z-[100] hidden flex-col items-center justify-center text-center px-6">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-black uppercase tracking-[0.3em] text-slate-600">Sedang mengolah gambar kualitas tinggi...</p>
    </div>

    <script>
        const state = {
            author: '@kreator_viral',
            avatar: null,
            bgColor: '#ffffff',
            textColor: '#0f172a',
            theme: 'modern',
            currentIndex: 0,
            slides: [
                { title: "TYPOGRAPHY\nFIXED V2.4", image: null, isCTA: false },
                { title: "Sekarang tema font\nbisa diakses lancar di HP.", image: null, isCTA: false },
                { title: "Cek tab 'Desain'\nuntuk ubah font!", image: null, isCTA: true }
            ]
        };

        const els = {
            authorInput: document.getElementById('input-author'),
            bgInput: document.getElementById('input-bg-color'),
            textInput: document.getElementById('input-text-color'),
            slidesContainer: document.getElementById('slides-inputs-container'),
            avatarPreview: document.getElementById('avatar-preview'),
            avatarPlaceholder: document.getElementById('avatar-placeholder'),
            captureNode: document.getElementById('capture-node'),
            bgLayer: document.getElementById('preview-bg-layer'),
            contentContainer: document.getElementById('slide-content-container'),
            previewAuthor: document.getElementById('preview-author'),
            slideTopCounter: document.getElementById('slide-top-counter'),
            loadingOverlay: document.getElementById('loading-overlay'),
            tabBtns: { content: document.getElementById('tab-content-btn'), style: document.getElementById('tab-style-btn') },
            sections: { content: document.getElementById('section-content'), style: document.getElementById('section-style') }
        };

        function init() {
            els.authorInput.value = state.author.replace('@', '');
            els.authorInput.oninput = (e) => { state.author = '@' + (e.target.value || 'user'); renderPreview(); };
            
            els.bgInput.oninput = (e) => { 
                state.bgColor = e.target.value; 
                document.getElementById('preview-bg-dot').style.backgroundColor = state.bgColor;
                document.getElementById('bg-hex-text').innerText = state.bgColor.toUpperCase();
                renderPreview(); 
            };

            els.textInput.oninput = (e) => { 
                state.textColor = e.target.value; 
                document.getElementById('preview-text-dot').style.backgroundColor = state.textColor;
                document.getElementById('text-hex-text').innerText = state.textColor.toUpperCase();
                renderPreview(); 
            };

            // Swipe Detection
            let startX = 0;
            els.captureNode.ontouchstart = e => startX = e.touches[0].clientX;
            els.captureNode.ontouchend = e => {
                let diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) diff > 0 ? nextSlide() : prevSlide();
            };

            renderSlideInputs();
            renderPreview();
            if(window.innerWidth > 1024) {
                els.sections.style.classList.remove('hidden');
            }
        }

        function switchTab(tab) {
            if (tab === 'content') {
                els.sections.content.classList.remove('hidden');
                els.sections.style.classList.add('hidden');
                els.tabBtns.content.classList.add('text-indigo-600', 'border-indigo-600');
                els.tabBtns.content.classList.remove('text-slate-400', 'border-transparent');
                els.tabBtns.style.classList.add('text-slate-400', 'border-transparent');
                els.tabBtns.style.classList.remove('text-indigo-600', 'border-indigo-600');
            } else {
                els.sections.style.classList.remove('hidden');
                els.sections.content.classList.add('hidden');
                els.tabBtns.style.classList.add('text-indigo-600', 'border-indigo-600');
                els.tabBtns.style.classList.remove('text-slate-400', 'border-transparent');
                els.tabBtns.content.classList.add('text-slate-400', 'border-transparent');
                els.tabBtns.content.classList.remove('text-indigo-600', 'border-indigo-600');
            }
        }

        function setTheme(theme) {
            state.theme = theme;
            document.querySelectorAll('.theme-btn').forEach(btn => {
                const isMatch = btn.dataset.theme === theme;
                btn.className = `theme-btn flex items-center justify-between px-5 py-4 rounded-xl border-2 transition-all ${isMatch ? 'border-indigo-600 bg-indigo-50' : 'border-slate-100 bg-white'}`;
                const text = btn.querySelector('span');
                text.className = isMatch ? text.className.replace('text-slate-400', 'text-indigo-600') : text.className.replace('text-indigo-600', 'text-slate-400');
                btn.querySelector('i').className = isMatch ? 'fa-solid fa-check-circle text-indigo-600' : 'fa-solid fa-circle text-slate-100';
            });
            renderPreview();
        }

        function renderSlideInputs() {
            els.slidesContainer.innerHTML = '';
            state.slides.forEach((slide, index) => {
                const active = index === state.currentIndex;
                const div = document.createElement('div');
                div.className = `slide-input-card rounded-xl p-4 border-2 transition-all ${active ? 'active' : 'bg-slate-50 border-transparent'}`;
                div.innerHTML = `
                    <div class="flex justify-between mb-2">
                        <span class="text-[9px] font-black uppercase text-slate-400">Slide ${index + 1}</span>
                        ${index > 0 ? `<button onclick="deleteSlide(${index})" class="text-slate-300"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                    </div>
                    <textarea class="w-full bg-white border border-slate-100 text-sm p-3 rounded-lg outline-none focus:border-indigo-500 mb-2 resize-none">${slide.title}</textarea>
                    <div class="flex justify-between items-center">
                        <label class="cursor-pointer text-[9px] font-black uppercase ${slide.image ? 'text-green-500' : 'text-slate-400'}">
                            <i class="fa-solid fa-image mr-1"></i> BG
                            <input type="file" class="hidden" accept="image/*" onchange="uploadImage(${index}, this)">
                        </label>
                        <button onclick="toggleCTA(${index})" class="text-[9px] font-black uppercase ${slide.isCTA ? 'text-indigo-600' : 'text-slate-400'}">
                            <i class="fa-solid fa-star mr-1"></i> CTA
                        </button>
                    </div>
                `;
                div.querySelector('textarea').oninput = (e) => { state.slides[index].title = e.target.value; renderPreview(); };
                div.onclick = (e) => { if(e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT' && !e.target.closest('button')) jumpToSlide(index); };
                els.slidesContainer.appendChild(div);
            });
        }

        function jumpToSlide(index) {
            state.currentIndex = index;
            renderSlideInputs();
            renderPreview();
            if(window.innerWidth < 1024) window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function uploadAvatar(input) {
            if (input.files?.[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.avatar = e.target.result;
                    els.avatarPreview.src = state.avatar;
                    els.avatarPreview.classList.remove('hidden');
                    els.avatarPlaceholder.classList.add('hidden');
                    renderPreview();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function uploadImage(index, input) {
            if (input.files?.[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { state.slides[index].image = e.target.result; renderSlideInputs(); renderPreview(); };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function toggleCTA(index) { state.slides[index].isCTA = !state.slides[index].isCTA; renderSlideInputs(); renderPreview(); }
        function addNewSlide() { state.slides.push({title: "Baru", image: null, isCTA: false}); jumpToSlide(state.slides.length-1); }
        function deleteSlide(idx) { state.slides.splice(idx, 1); state.currentIndex = Math.min(state.currentIndex, state.slides.length-1); renderSlideInputs(); renderPreview(); }
        function prevSlide() { jumpToSlide(state.currentIndex > 0 ? state.currentIndex - 1 : state.slides.length - 1); }
        function nextSlide() { jumpToSlide(state.currentIndex < state.slides.length - 1 ? state.currentIndex + 1 : 0); }

        function renderPreview() {
            const slide = state.slides[state.currentIndex];
            const textRaw = slide.title.replace(/\n/g, '<br/>');
            let fontSize = state.theme === 'impact' ? 100 : (state.theme === 'elegant' ? 75 : 70);
            if (slide.title.length > 50) fontSize *= 0.6;

            els.previewAuthor.innerText = state.author;
            els.slideTopCounter.innerText = `${state.currentIndex + 1} / ${state.slides.length}`;
            
            const avatarHtml = state.avatar ? `<img src="${state.avatar}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-user text-slate-300"></i>`;
            document.getElementById('footer-avatar-container').innerHTML = avatarHtml;

            if (slide.image) {
                els.bgLayer.innerHTML = `<img src="${slide.image}" class="w-full h-full object-cover"><div class="absolute inset-0 bg-black/40"></div>`;
                els.captureNode.style.color = '#ffffff';
                els.previewAuthor.style.color = '#ffffff';
            } else {
                els.bgLayer.innerHTML = '';
                els.captureNode.style.backgroundColor = state.bgColor;
                els.captureNode.style.color = state.textColor;
                els.previewAuthor.style.color = state.textColor;
            }

            if (slide.isCTA) {
                els.contentContainer.className = "absolute inset-0 z-20 flex flex-col items-center justify-center p-10 text-center";
                els.contentContainer.innerHTML = `
                    <div class="w-32 h-32 rounded-[2rem] bg-white shadow-2xl mb-6 overflow-hidden border-4 border-white">
                        ${avatarHtml}
                    </div>
                    <h2 class="text-xl font-black mb-2">${state.author}</h2>
                    <p class="font-bold leading-tight" style="font-size: ${fontSize*0.4}px">${textRaw}</p>
                `;
            } else {
                els.contentContainer.className = `absolute inset-0 z-20 flex flex-col justify-end p-10 pb-32 text-left font-${state.theme}`;
                els.contentContainer.innerHTML = `<h1 style="font-size: ${fontSize}px">${textRaw}</h1>`;
            }
        }

        async function downloadAllSlides() {
            els.loadingOverlay.style.display = 'flex';
            const original = state.currentIndex;
            for(let i=0; i<state.slides.length; i++) {
                state.currentIndex = i; renderPreview();
                await new Promise(r => setTimeout(r, 600));
                const canv = await html2canvas(els.captureNode, {scale: 2});
                const l = document.createElement('a');
                l.download = `Slide-${i+1}.png`; l.href = canv.toDataURL(); l.click();
            }
            state.currentIndex = original; renderPreview();
            els.loadingOverlay.style.display = 'none';
        }

        init();
    </script>
</body>
</html>
