<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralGen V2.3 - Mobile Fixed</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        display: ['Bebas Neue', 'cursive'],
                    },
                }
            }
        }
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; overscroll-behavior-y: contain; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .color-wrapper input[type="color"] { opacity: 0; position: absolute; inset: 0; width: 100%; height: 100%; cursor: pointer; }
        
        .slide-input-card.active {
            border-color: #6366f1;
            background-color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        @media (max-width: 1024px) {
            .mobile-bottom-panel { height: 45vh; }
            .preview-container { height: 55vh; }
        }

        #slide-content-container h1 {
            word-wrap: break-word;
            overflow-wrap: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 10;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        #capture-node {
            aspect-ratio: 1 / 1;
            max-width: 100%;
            max-height: 100%;
            touch-action: pan-y; /* Memungkinkan scroll vertikal tapi menjaga gesture horizontal */
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 h-screen w-full flex flex-col lg:flex-row overflow-hidden font-sans">

    <!-- Dekorasi -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] bg-blue-100/30 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-[40%] h-[40%] bg-rose-100/30 rounded-full blur-[100px]"></div>
    </div>

    <!-- HEADER (Mobile) -->
    <header class="lg:hidden bg-white border-b border-slate-200 px-5 py-3 flex justify-between items-center z-50">
        <h1 class="text-md font-black text-slate-900 flex items-center gap-2">
            <span class="w-7 h-7 rounded-lg bg-indigo-600 flex items-center justify-center text-white text-[10px]">
                <i class="fa-solid fa-bolt"></i>
            </span>
            ViralGen <span class="text-indigo-500">2.3</span>
        </h1>
        <button onclick="downloadAllSlides()" class="bg-slate-900 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest">
            <i class="fa-solid fa-download mr-1"></i> Simpan
        </button>
    </header>

    <!-- PREVIEW AREA -->
    <main class="preview-container flex-1 relative flex flex-col items-center justify-center p-4 lg:p-12 overflow-hidden bg-slate-50/50 lg:order-2">
        <div class="relative w-full h-full flex items-center justify-center max-w-2xl mx-auto">
            
            <!-- Canvas Slide -->
            <div id="capture-node" class="relative bg-white flex flex-col overflow-hidden shadow-2xl transition-all duration-300 w-full max-w-[85vw] sm:max-w-[500px]">
                <div id="preview-bg-layer" class="absolute inset-0 z-0 pointer-events-none"></div>
                
                <div class="absolute top-4 right-4 z-50" id="counter-badge">
                    <div class="bg-black/20 backdrop-blur-md border border-white/20 text-white font-black text-[10px] px-3 py-1.5 rounded-lg" id="slide-top-counter">1 / 3</div>
                </div>

                <div id="slide-content-container" class="absolute inset-0 z-20 flex flex-col pointer-events-none"></div>

                <div id="footer-branding" class="absolute bottom-0 left-0 w-full z-50 h-20 sm:h-28 px-6 sm:px-12 flex items-center justify-between pointer-events-none">
                    <div class="flex items-center gap-2 sm:gap-4 bg-white/10 backdrop-blur-lg border border-white/30 pl-1.5 pr-4 py-1.5 rounded-full">
                        <div id="footer-avatar-container" class="w-7 h-7 sm:w-10 sm:h-10 rounded-full bg-slate-200 overflow-hidden flex items-center justify-center border-2 border-white"></div>
                        <span id="preview-author" class="font-black tracking-tight text-[10px] sm:text-sm">@username</span>
                    </div>
                </div>
            </div>

            <!-- Tombol Navigasi yang Diperbaiki -->
            <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-0 sm:px-4 z-[60] pointer-events-none">
                <button id="btn-prev" onclick="prevSlide()" class="pointer-events-auto w-12 h-12 bg-white/80 text-slate-900 rounded-full flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all shadow-xl border border-slate-100 ml-[-10px] sm:ml-0">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
                <button id="btn-next" onclick="nextSlide()" class="pointer-events-auto w-12 h-12 bg-white/80 text-slate-900 rounded-full flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all shadow-xl border border-slate-100 mr-[-10px] sm:mr-0">
                    <i class="fa-solid fa-chevron-right"></i>
                </button>
            </div>
        </div>
        <p class="lg:hidden text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-4">Geser slide untuk navigasi</p>
    </main>

    <!-- CONTROL PANEL -->
    <aside class="mobile-bottom-panel lg:h-screen w-full lg:w-[450px] bg-white border-t lg:border-t-0 lg:border-r border-slate-200 flex flex-col overflow-hidden relative z-40 lg:order-1">
        
        <!-- Tabs (Mobile) -->
        <div class="lg:hidden flex border-b border-slate-100">
            <button onclick="switchTab('content')" id="tab-content" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-indigo-600 border-b-2 border-indigo-600">Konten</button>
            <button onclick="switchTab('style')" id="tab-style" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">Branding</button>
        </div>

        <div class="flex-1 overflow-y-auto px-6 py-6 lg:p-8 space-y-8" id="sidebar-scroll">
            
            <!-- Branding Section -->
            <div id="section-style" class="hidden lg:block space-y-6">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Branding Utama</label>
                <div class="flex gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="relative w-14 h-14 rounded-xl bg-white border-2 border-dashed border-slate-200 overflow-hidden flex-shrink-0 flex items-center justify-center">
                        <img id="avatar-preview" src="" class="w-full h-full object-cover hidden">
                        <i id="avatar-placeholder" class="fa-solid fa-user text-slate-300"></i>
                        <input type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="uploadAvatar(this)">
                    </div>
                    <div class="flex-1">
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">@</span>
                            <input type="text" id="input-author" placeholder="username" 
                                class="w-full bg-white border border-slate-200 text-sm rounded-xl py-2.5 pl-8 pr-4 focus:border-indigo-500 outline-none">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-2">
                        <span class="text-[9px] text-slate-400 uppercase font-black">Warna Latar</span>
                        <div class="h-11 w-full bg-slate-50 border border-slate-200 rounded-xl relative flex items-center px-3 gap-2 color-wrapper">
                            <div id="preview-bg-dot" class="w-5 h-5 rounded border border-white shadow-sm" style="background-color: #ffffff;"></div>
                            <span id="bg-hex-text" class="text-[10px] font-mono">#FFFFFF</span>
                            <input type="color" id="input-bg-color" value="#ffffff">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <span class="text-[9px] text-slate-400 uppercase font-black">Warna Teks</span>
                        <div class="h-11 w-full bg-slate-50 border border-slate-200 rounded-xl relative flex items-center px-3 gap-2 color-wrapper">
                            <div id="preview-text-dot" class="w-5 h-5 rounded border border-white shadow-sm" style="background-color: #0f172a;"></div>
                            <span id="text-hex-text" class="text-[10px] font-mono">#0F172A</span>
                            <input type="color" id="input-text-color" value="#0f172a">
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <span class="text-[9px] text-slate-400 uppercase font-black">Pilih Tipografi</span>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setTheme('modern')" data-theme="modern" class="theme-btn active py-3 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-[10px] font-black text-indigo-600">MODERN</button>
                        <button onclick="setTheme('elegant')" data-theme="elegant" class="theme-btn py-3 rounded-xl border-2 border-slate-100 text-[10px] font-black text-slate-400">ELEGANT</button>
                        <button onclick="setTheme('impact')" data-theme="impact" class="theme-btn py-3 rounded-xl border-2 border-slate-100 text-[10px] font-black text-slate-400">IMPACT</button>
                    </div>
                </div>
            </div>

            <!-- Content Section -->
            <div id="section-content" class="space-y-6 pb-20 lg:pb-0">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Editor Slide</label>
                    <label class="cursor-pointer bg-amber-50 text-amber-600 px-3 py-1.5 rounded-lg text-[9px] font-black border border-amber-200">
                        <i class="fa-solid fa-file-import mr-1"></i> IMPORT TXT
                        <input type="file" id="import-txt" class="hidden" accept=".txt" onchange="handleImportTXT(this)">
                    </label>
                </div>

                <div id="slides-inputs-container" class="space-y-4">
                    <!-- Dinamis via JS -->
                </div>

                <button onclick="addNewSlide()" class="w-full py-4 border-2 border-dashed border-slate-200 bg-slate-50 rounded-2xl text-[10px] font-black text-slate-400 hover:text-indigo-600 transition-all uppercase">
                    <i class="fa-solid fa-plus-circle mr-2"></i> Tambah Slide Baru
                </button>
            </div>
        </div>

        <div class="hidden lg:block p-8 border-t border-slate-100 bg-white">
            <button onclick="downloadAllSlides()" class="w-full bg-slate-900 text-white font-black py-4 rounded-xl shadow-xl hover:bg-indigo-600 transition-all text-xs uppercase tracking-[0.2em]">
                Simpan Ke Galeri (PNG)
            </button>
        </div>
    </aside>

    <div id="loading-overlay" class="fixed inset-0 bg-white/95 backdrop-blur-md z-[100] hidden flex-col items-center justify-center">
        <div class="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-[10px] font-black mt-4 uppercase tracking-[0.3em] text-slate-600">Sedang Mengekspor...</p>
    </div>

    <script>
        const state = {
            author: '@kreator_viral',
            avatar: null,
            bgColor: '#ffffff',
            textColor: '#0f172a',
            theme: 'modern',
            currentIndex: 0,
            slides: [
                { title: "CARA MEMBUAT\nDESAIN VIRAL", image: null, isCTA: false },
                { title: "Gunakan ViralGen V2.3\nFixed Mobile Navigation & Image Upload.", image: null, isCTA: false },
                { title: "Follow untuk tips\nmenarik lainnya!", image: null, isCTA: true }
            ]
        };

        const els = {
            authorInput: document.getElementById('input-author'),
            bgInput: document.getElementById('input-bg-color'),
            textInput: document.getElementById('input-text-color'),
            slidesContainer: document.getElementById('slides-inputs-container'),
            avatarPreview: document.getElementById('avatar-preview'),
            avatarPlaceholder: document.getElementById('avatar-placeholder'),
            footerAvatarContainer: document.getElementById('footer-avatar-container'),
            captureNode: document.getElementById('capture-node'),
            bgLayer: document.getElementById('preview-bg-layer'),
            contentContainer: document.getElementById('slide-content-container'),
            previewAuthor: document.getElementById('preview-author'),
            slideTopCounter: document.getElementById('slide-top-counter'),
            loadingOverlay: document.getElementById('loading-overlay')
        };

        function init() {
            els.authorInput.value = state.author.replace('@', '');
            els.authorInput.addEventListener('input', (e) => { state.author = '@' + (e.target.value || 'user'); renderPreview(); });
            
            els.bgInput.addEventListener('input', (e) => { 
                state.bgColor = e.target.value; 
                document.getElementById('preview-bg-dot').style.backgroundColor = state.bgColor;
                document.getElementById('bg-hex-text').innerText = state.bgColor.toUpperCase();
                renderPreview(); 
            });

            els.textInput.addEventListener('input', (e) => { 
                state.textColor = e.target.value; 
                document.getElementById('preview-text-dot').style.backgroundColor = state.textColor;
                document.getElementById('text-hex-text').innerText = state.textColor.toUpperCase();
                renderPreview(); 
            });

            initTouchGestures();
            renderSlideInputs();
            renderPreview();
        }

        // Swipe Gesture untuk Mobile
        let touchStartX = 0;
        let touchEndX = 0;

        function initTouchGestures() {
            const node = els.captureNode;
            node.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, {passive: true});
            node.addEventListener('touchend', e => { 
                touchEndX = e.changedTouches[0].screenX; 
                handleSwipe();
            }, {passive: true});
        }

        function handleSwipe() {
            const threshold = 50;
            if (touchEndX < touchStartX - threshold) nextSlide();
            if (touchEndX > touchStartX + threshold) prevSlide();
        }

        function switchTab(tab) {
            const secContent = document.getElementById('section-content');
            const secStyle = document.getElementById('section-style');
            const btns = { content: document.getElementById('tab-content'), style: document.getElementById('tab-style') };

            if(tab === 'content') {
                secContent.classList.remove('hidden'); secStyle.classList.add('hidden');
                btns.content.className = "flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-indigo-600 border-b-2 border-indigo-600";
                btns.style.className = "flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400";
            } else {
                secContent.classList.add('hidden'); secStyle.classList.remove('hidden');
                btns.style.className = "flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-indigo-600 border-b-2 border-indigo-600";
                btns.content.className = "flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400";
            }
        }

        function renderSlideInputs() {
            els.slidesContainer.innerHTML = '';
            state.slides.forEach((slide, index) => {
                const isActive = index === state.currentIndex;
                const div = document.createElement('div');
                div.className = `slide-input-card rounded-2xl p-4 border-2 transition-all duration-300 ${isActive ? 'active' : 'bg-slate-50 border-transparent'}`;
                
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[9px] font-black uppercase tracking-widest ${isActive ? 'text-indigo-600' : 'text-slate-400'}">Slide ${index + 1}</span>
                        <div class="flex items-center gap-3">
                            ${index > 0 ? `<button onclick="event.stopPropagation(); deleteSlide(${index})" class="text-slate-300 hover:text-rose-500 p-1"><i class="fa-solid fa-trash-can"></i></button>` : ''}
                        </div>
                    </div>
                    <textarea class="w-full bg-white border border-slate-100 text-slate-800 text-sm p-3 rounded-xl focus:border-indigo-500 outline-none resize-none font-semibold mb-3" 
                        rows="2">${slide.title}</textarea>
                    
                    <div class="flex items-center justify-between border-t border-slate-100 pt-3">
                        <div class="flex items-center gap-3">
                            <label class="cursor-pointer flex items-center gap-1.5 text-[9px] font-black uppercase ${slide.image ? 'text-green-500' : 'text-slate-400'}">
                                <i class="fa-solid fa-image"></i> ${slide.image ? 'Ganti BG' : 'Tambah BG'}
                                <input type="file" class="hidden" accept="image/*" onchange="uploadImage(${index}, this)">
                            </label>
                            ${slide.image ? `<button onclick="event.stopPropagation(); removeImage(${index})" class="text-rose-400 text-[9px] font-black uppercase"><i class="fa-solid fa-xmark"></i></button>` : ''}
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="cta-${index}" class="peer hidden" onchange="toggleCTA(${index})" ${slide.isCTA ? 'checked' : ''}>
                            <label for="cta-${index}" class="cursor-pointer flex items-center gap-2 text-[9px] font-black uppercase text-slate-400 peer-checked:text-indigo-600 select-none">
                                <div class="w-4 h-4 border-2 border-slate-200 rounded flex items-center justify-center peer-checked:bg-indigo-600 peer-checked:border-indigo-600">
                                    <i class="fa-solid fa-check text-[8px] text-white"></i>
                                </div> CTA
                            </label>
                        </div>
                    </div>
                `;

                div.querySelector('textarea').addEventListener('input', (e) => {
                    state.slides[index].title = e.target.value;
                    renderPreview();
                });

                div.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT' && !e.target.closest('button') && !e.target.closest('label')) {
                        jumpToSlide(index);
                    }
                });

                els.slidesContainer.appendChild(div);
            });
        }

        function jumpToSlide(index) {
            state.currentIndex = index;
            renderSlideInputs();
            renderPreview();
            if (window.innerWidth < 1024) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function uploadAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.avatar = e.target.result;
                    els.avatarPreview.src = state.avatar;
                    els.avatarPreview.classList.remove('hidden');
                    els.avatarPlaceholder.classList.add('hidden');
                    renderPreview();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function uploadImage(index, input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { 
                    state.slides[index].image = e.target.result; 
                    renderSlideInputs(); 
                    renderPreview(); 
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removeImage(index) {
            state.slides[index].image = null;
            renderSlideInputs();
            renderPreview();
        }

        function toggleCTA(index) {
            state.slides[index].isCTA = !state.slides[index].isCTA;
            renderPreview();
        }

        function addNewSlide() {
            state.slides.push({ title: "Konten Baru", image: null, isCTA: false });
            jumpToSlide(state.slides.length - 1);
        }

        function deleteSlide(index) {
            state.slides.splice(index, 1);
            state.currentIndex = Math.min(state.currentIndex, state.slides.length - 1);
            renderSlideInputs();
            renderPreview();
        }

        function prevSlide() { 
            if (state.currentIndex > 0) jumpToSlide(state.currentIndex - 1); 
            else jumpToSlide(state.slides.length - 1);
        }
        function nextSlide() { 
            if (state.currentIndex < state.slides.length - 1) jumpToSlide(state.currentIndex + 1); 
            else jumpToSlide(0);
        }

        function setTheme(theme) {
            state.theme = theme;
            document.querySelectorAll('.theme-btn').forEach(btn => {
                const active = btn.dataset.theme === theme;
                btn.className = `theme-btn py-3 rounded-xl border-2 transition-all ${active ? 'border-indigo-600 bg-indigo-50 text-indigo-600 font-black' : 'border-slate-100 bg-white text-slate-400 font-black'} text-[10px]`;
            });
            renderPreview();
        }

        function handleImportTXT(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target.result;
                    const parts = content.split(';').map(p => p.trim()).filter(p => p.length > 0);
                    if (parts.length > 0) {
                        state.slides = parts.map((text, idx) => ({ title: text, image: null, isCTA: idx === parts.length - 1 }));
                        jumpToSlide(0);
                    }
                };
                reader.readAsText(input.files[0]);
            }
        }

        function renderPreview() {
            const slide = state.slides[state.currentIndex];
            if(!slide) return;
            
            const textRaw = slide.title.replace(/\n/g, '<br/>');
            const length = slide.title.length;
            let fontSize = state.theme === 'impact' ? 110 : (state.theme === 'elegant' ? 80 : 75);
            
            if (length > 20) fontSize *= 0.8;
            if (length > 50) fontSize *= 0.65;
            if (length > 100) fontSize *= 0.45;

            els.previewAuthor.innerText = state.author;
            els.slideTopCounter.innerText = `${state.currentIndex + 1} / ${state.slides.length}`;
            els.footerAvatarContainer.innerHTML = state.avatar ? `<img src="${state.avatar}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-user text-slate-300"></i>`;

            if (slide.image) {
                els.bgLayer.innerHTML = `<img src="${slide.image}" class="absolute inset-0 w-full h-full object-cover"><div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/20 to-transparent"></div>`;
                els.captureNode.style.color = '#ffffff'; 
                els.previewAuthor.style.color = '#ffffff';
            } else {
                els.bgLayer.innerHTML = '';
                els.captureNode.style.backgroundColor = state.bgColor;
                els.captureNode.style.color = state.textColor;
                els.previewAuthor.style.color = state.textColor;
            }

            if (slide.isCTA) {
                document.getElementById('counter-badge').style.opacity = '0';
                document.getElementById('footer-branding').style.opacity = '0';
                els.contentContainer.className = "absolute inset-0 z-20 flex flex-col items-center justify-center p-8 text-center";
                els.contentContainer.innerHTML = `
                    <div class="w-28 h-28 sm:w-40 sm:h-40 rounded-[2.5rem] p-1 bg-gradient-to-br from-indigo-500 to-rose-500 shadow-2xl mb-6">
                        <div class="w-full h-full rounded-[2.3rem] bg-white flex items-center justify-center overflow-hidden border-[4px] border-white">
                            ${state.avatar ? `<img src="${state.avatar}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-user text-4xl text-slate-200"></i>`}
                        </div>
                    </div>
                    <h2 class="text-xl font-black mb-2 tracking-tighter" style="color: inherit">${state.author}</h2>
                    <p class="font-bold leading-tight max-w-[90%]" style="color: inherit; font-size: ${fontSize * 0.35}px">${textRaw}</p>
                    <div class="flex gap-6 mt-8 opacity-20">
                        <i class="fa-solid fa-heart text-xl"></i>
                        <i class="fa-solid fa-comment text-xl"></i>
                        <i class="fa-solid fa-paper-plane text-xl"></i>
                    </div>
                `;
            } else {
                document.getElementById('counter-badge').style.opacity = '1';
                document.getElementById('footer-branding').style.opacity = '1';
                els.contentContainer.className = "absolute inset-0 z-20 flex flex-col justify-end p-8 sm:p-14 pb-24 sm:pb-36 text-left";
                
                let fontClass = state.theme === 'modern' ? 'font-black tracking-tighter leading-[0.95] uppercase font-sans' : 
                                 state.theme === 'elegant' ? 'font-bold italic leading-[1.1] font-serif' : 
                                 'font-normal tracking-wide leading-[0.8] font-display uppercase';
                
                els.contentContainer.innerHTML = `<h1 class="${fontClass}" style="font-size: ${fontSize}px">${textRaw}</h1>`;
            }
        }

        async function downloadAllSlides() {
            els.loadingOverlay.style.display = 'flex';
            const originalIndex = state.currentIndex;
            try {
                for (let i = 0; i < state.slides.length; i++) {
                    state.currentIndex = i;
                    renderPreview();
                    await new Promise(r => setTimeout(r, 600)); 
                    const canvas = await html2canvas(els.captureNode, { scale: 2, useCORS: true, allowTaint: true });
                    const link = document.createElement('a');
                    link.download = `ViralGen-${i + 1}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    await new Promise(r => setTimeout(r, 100)); 
                }
            } catch (err) { console.error(err); } 
            finally {
                state.currentIndex = originalIndex;
                renderPreview();
                els.loadingOverlay.style.display = 'none';
            }
        }

        window.onload = init;
    </script>
</body>
</html>
