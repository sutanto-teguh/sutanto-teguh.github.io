<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ViralGen V2.2 - Mobile Optimized</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                        display: ['Bebas Neue', 'cursive'],
                    },
                }
            }
        }
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .color-wrapper input[type="color"] { opacity: 0; position: absolute; inset: 0; width: 100%; height: 100%; cursor: pointer; }
        
        .slide-input-card.active {
            border-color: #6366f1;
            background-color: white;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.15);
        }

        /* Mobile specific adjustments */
        @media (max-width: 1024px) {
            .mobile-bottom-panel {
                height: 45vh;
            }
            .preview-container {
                height: 55vh;
            }
        }

        #slide-content-container h1 {
            word-wrap: break-word;
            overflow-wrap: break-word;
            display: -webkit-box;
            -webkit-line-clamp: 10;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Fluid Canvas */
        #capture-node {
            aspect-ratio: 1 / 1;
            max-width: 100%;
            max-height: 100%;
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-800 h-screen w-full flex flex-col lg:flex-row overflow-hidden font-sans">

    <!-- Latar Belakang Dekoratif -->
    <div class="fixed top-0 left-0 w-full h-full overflow-hidden -z-10 pointer-events-none">
        <div class="absolute top-[-10%] right-[-5%] w-[40%] h-[40%] bg-blue-100/50 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-10%] left-[-5%] w-[40%] h-[40%] bg-rose-100/50 rounded-full blur-[100px]"></div>
    </div>

    <!-- HEADER (Hanya Mobile) -->
    <header class="lg:hidden bg-white/80 backdrop-blur-md border-b border-slate-200 px-5 py-3 flex justify-between items-center z-50">
        <h1 class="text-lg font-black text-slate-900 flex items-center gap-2">
            <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-indigo-500 to-rose-500 flex items-center justify-center text-white text-xs">
                <i class="fa-solid fa-wand-magic-sparkles"></i>
            </span>
            ViralGen <span class="text-indigo-500 text-xs">V2.2</span>
        </h1>
        <button onclick="downloadAllSlides()" class="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-lg shadow-indigo-200">
            <i class="fa-solid fa-download"></i> EKSPOR
        </button>
    </header>

    <!-- AREA PREVIEW (Bagian Atas di Mobile, Kanan di Desktop) -->
    <main class="preview-container flex-1 relative flex flex-col items-center justify-center p-4 lg:p-12 overflow-hidden bg-slate-50/30 lg:order-2">
        
        <!-- Live Badge (Hidden on small mobile) -->
        <div class="hidden sm:flex absolute top-6 items-center gap-2 bg-white px-4 py-2 rounded-full border border-slate-200 shadow-sm z-20">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
            <span class="text-[10px] font-black text-slate-900 uppercase tracking-widest">Live Editor</span>
        </div>

        <div class="relative w-full h-full flex items-center justify-center">
            <!-- Container Slide yang Responsif -->
            <div id="capture-node" class="relative bg-white flex flex-col overflow-hidden shadow-2xl transition-all duration-300 w-[85vw] sm:w-[500px] lg:w-[600px]">
                <div id="preview-bg-layer" class="absolute inset-0 z-0 pointer-events-none"></div>
                
                <div class="absolute top-4 right-4 sm:top-8 sm:right-8 z-50" id="counter-badge">
                    <div class="bg-black/10 backdrop-blur-md border border-white/20 text-white font-black text-[10px] sm:text-xs px-3 py-1.5 rounded-lg" id="slide-top-counter">1 / 3</div>
                </div>

                <div id="slide-content-container" class="absolute inset-0 z-20 flex flex-col"></div>

                <div id="footer-branding" class="absolute bottom-0 left-0 w-full z-50 h-20 sm:h-28 px-6 sm:px-12 flex items-center justify-between">
                    <div class="flex items-center gap-2 sm:gap-4 bg-white/10 backdrop-blur-lg border border-white/30 pl-1.5 pr-4 py-1.5 rounded-full">
                        <div id="footer-avatar-container" class="w-7 h-7 sm:w-10 sm:h-10 rounded-full bg-slate-200 overflow-hidden flex items-center justify-center border-2 border-white"></div>
                        <span id="preview-author" class="font-black tracking-tight text-[10px] sm:text-sm">@username</span>
                    </div>
                    <div class="flex items-center gap-2 text-slate-500/50">
                        <i class="fa-solid fa-arrow-right-long text-xs"></i>
                    </div>
                </div>
            </div>

            <!-- Navigation Overlay -->
            <div class="absolute inset-x-0 top-1/2 -translate-y-1/2 flex justify-between px-2 pointer-events-none">
                <button onclick="prevSlide()" class="pointer-events-auto w-10 h-10 sm:w-14 sm:h-14 bg-white/90 text-slate-900 rounded-full flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all shadow-lg border border-slate-100 backdrop-blur-sm">
                    <i class="fa-solid fa-chevron-left text-xs sm:text-base"></i>
                </button>
                <button onclick="nextSlide()" class="pointer-events-auto w-10 h-10 sm:w-14 sm:h-14 bg-white/90 text-slate-900 rounded-full flex items-center justify-center hover:bg-indigo-600 hover:text-white transition-all shadow-lg border border-slate-100 backdrop-blur-sm">
                    <i class="fa-solid fa-chevron-right text-xs sm:text-base"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- PANEL KONTROL (Kiri di Desktop, Bawah di Mobile) -->
    <aside class="mobile-bottom-panel lg:h-screen w-full lg:w-[450px] bg-white border-t lg:border-t-0 lg:border-r border-slate-200 flex flex-col overflow-hidden relative z-40 shadow-2xl lg:order-1">
        
        <!-- Tab Navigation (Mobile Only) -->
        <div class="lg:hidden flex border-b border-slate-100 bg-slate-50/50">
            <button onclick="switchTab('content')" id="tab-content" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-indigo-600 border-b-2 border-indigo-600">Konten</button>
            <button onclick="switchTab('style')" id="tab-style" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-slate-400">Branding</button>
        </div>

        <div class="flex-1 overflow-y-auto px-6 py-6 lg:p-8 space-y-8" id="sidebar-scroll">
            
            <!-- SECTION: BRANDING -->
            <div id="section-style" class="hidden lg:block space-y-6">
                <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Identitas Brand</label>
                <div class="flex gap-4 p-4 bg-slate-50 rounded-2xl border border-slate-100">
                    <div class="relative w-14 h-14 rounded-xl bg-white border-2 border-dashed border-slate-200 overflow-hidden flex-shrink-0 flex items-center justify-center">
                        <img id="avatar-preview" src="" class="w-full h-full object-cover hidden">
                        <i id="avatar-placeholder" class="fa-solid fa-camera text-slate-300"></i>
                        <input type="file" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="uploadAvatar(this)">
                    </div>
                    <div class="flex-1 space-y-2">
                        <div class="relative">
                            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-sm">@</span>
                            <input type="text" id="input-author" placeholder="username" 
                                class="w-full bg-white border border-slate-200 text-sm rounded-xl py-2.5 pl-8 pr-4 focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-2">
                        <span class="text-[10px] text-slate-400 uppercase font-bold">Warna BG</span>
                        <div class="h-11 w-full bg-slate-50 border border-slate-200 rounded-xl relative flex items-center px-3 gap-2 color-wrapper">
                            <div id="preview-bg-dot" class="w-5 h-5 rounded border border-white shadow-sm" style="background-color: #ffffff;"></div>
                            <span id="bg-hex-text" class="text-[10px] font-mono text-slate-500">#FFFFFF</span>
                            <input type="color" id="input-bg-color" value="#ffffff">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <span class="text-[10px] text-slate-400 uppercase font-bold">Warna Teks</span>
                        <div class="h-11 w-full bg-slate-50 border border-slate-200 rounded-xl relative flex items-center px-3 gap-2 color-wrapper">
                            <div id="preview-text-dot" class="w-5 h-5 rounded border border-white shadow-sm" style="background-color: #0f172a;"></div>
                            <span id="text-hex-text" class="text-[10px] font-mono text-slate-500">#0F172A</span>
                            <input type="color" id="input-text-color" value="#0f172a">
                        </div>
                    </div>
                </div>

                <div class="space-y-3">
                    <span class="text-[10px] text-slate-400 uppercase font-bold">Tema Font</span>
                    <div class="grid grid-cols-3 gap-2">
                        <button onclick="setTheme('modern')" data-theme="modern" class="theme-btn active py-3 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-[10px] font-black text-indigo-600 transition-all">MODERN</button>
                        <button onclick="setTheme('elegant')" data-theme="elegant" class="theme-btn py-3 rounded-xl border-2 border-slate-100 bg-white text-[10px] font-black text-slate-400 transition-all">ELEGANT</button>
                        <button onclick="setTheme('impact')" data-theme="impact" class="theme-btn py-3 rounded-xl border-2 border-slate-100 bg-white text-[10px] font-black text-slate-400 transition-all">IMPACT</button>
                    </div>
                </div>
            </div>

            <!-- SECTION: CONTENT SLIDES -->
            <div id="section-content" class="space-y-6">
                <div class="flex justify-between items-center">
                    <label class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">Isi Slide</label>
                    <label class="cursor-pointer bg-amber-50 text-amber-600 px-3 py-1.5 rounded-lg text-[9px] font-black border border-amber-200 uppercase tracking-tighter">
                        <i class="fa-solid fa-file-import"></i> Import TXT
                        <input type="file" id="import-txt" class="hidden" accept=".txt" onchange="handleImportTXT(this)">
                    </label>
                </div>

                <div id="slides-inputs-container" class="space-y-4">
                    <!-- Dinamis via JS -->
                </div>

                <button onclick="addNewSlide()" class="w-full py-4 border-2 border-dashed border-slate-200 bg-slate-50 rounded-2xl text-[11px] font-black text-slate-400 hover:border-indigo-400 hover:text-indigo-600 hover:bg-indigo-50 transition-all uppercase tracking-widest">
                    <i class="fa-solid fa-plus-circle"></i> Tambah Slide
                </button>
            </div>
        </div>

        <!-- Footer Desktop Only -->
        <div class="hidden lg:block p-8 border-t border-slate-100 bg-white">
            <button onclick="downloadAllSlides()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-xl shadow-slate-200 hover:bg-indigo-600 transition-all flex items-center justify-center gap-3 tracking-widest text-xs uppercase">
                <i class="fa-solid fa-cloud-arrow-down text-base"></i> Ekspor Semua Slide
            </button>
        </div>
    </aside>

    <!-- Overlay Loading -->
    <div id="loading-overlay" class="fixed inset-0 bg-white/90 backdrop-blur-md z-[100] hidden flex-col items-center justify-center">
        <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="text-xs font-black mt-4 uppercase tracking-[0.3em] text-slate-400">Menyimpan Gambar...</p>
    </div>

    <script>
        const state = {
            author: '@kreator_viral',
            avatar: null,
            bgColor: '#ffffff',
            textColor: '#0f172a',
            theme: 'modern',
            currentIndex: 0,
            slides: [
                { title: "CARA MEMBUAT\nDESAIN VIRAL", image: null, isCTA: false },
                { title: "Gunakan ViralGen V2.2\nyang sekarang lebih cepat dan mobile friendly.", image: null, isCTA: false },
                { title: "Suka tips ini?\nSIMPAN SEKARANG!", image: null, isCTA: true }
            ]
        };

        const els = {
            authorInput: document.getElementById('input-author'),
            bgInput: document.getElementById('input-bg-color'),
            textInput: document.getElementById('input-text-color'),
            slidesContainer: document.getElementById('slides-inputs-container'),
            avatarPreview: document.getElementById('avatar-preview'),
            avatarPlaceholder: document.getElementById('avatar-placeholder'),
            footerAvatarContainer: document.getElementById('footer-avatar-container'),
            captureNode: document.getElementById('capture-node'),
            bgLayer: document.getElementById('preview-bg-layer'),
            contentContainer: document.getElementById('slide-content-container'),
            previewAuthor: document.getElementById('preview-author'),
            slideTopCounter: document.getElementById('slide-top-counter'),
            loadingOverlay: document.getElementById('loading-overlay')
        };

        function init() {
            els.authorInput.value = state.author.replace('@', '');
            els.authorInput.addEventListener('input', (e) => { state.author = '@' + (e.target.value || 'user'); renderPreview(); });
            els.bgInput.addEventListener('input', (e) => { 
                state.bgColor = e.target.value; 
                document.getElementById('preview-bg-dot').style.backgroundColor = state.bgColor;
                document.getElementById('bg-hex-text').innerText = state.bgColor.toUpperCase();
                renderPreview(); 
            });
            els.textInput.addEventListener('input', (e) => { 
                state.textColor = e.target.value; 
                document.getElementById('preview-text-dot').style.backgroundColor = state.textColor;
                document.getElementById('text-hex-text').innerText = state.textColor.toUpperCase();
                renderPreview(); 
            });

            renderSlideInputs();
            renderPreview();
        }

        function switchTab(tab) {
            const secContent = document.getElementById('section-content');
            const secStyle = document.getElementById('section-style');
            const btnContent = document.getElementById('tab-content');
            const btnStyle = document.getElementById('tab-style');

            if(tab === 'content') {
                secContent.classList.remove('hidden');
                secStyle.classList.add('hidden');
                btnContent.classList.add('text-indigo-600', 'border-indigo-600');
                btnContent.classList.remove('text-slate-400');
                btnStyle.classList.add('text-slate-400');
                btnStyle.classList.remove('text-indigo-600', 'border-indigo-600');
            } else {
                secContent.classList.add('hidden');
                secStyle.classList.remove('hidden');
                btnStyle.classList.add('text-indigo-600', 'border-indigo-600');
                btnStyle.classList.remove('text-slate-400');
                btnContent.classList.add('text-slate-400');
                btnContent.classList.remove('text-indigo-600', 'border-indigo-600');
            }
        }

        function renderSlideInputs() {
            els.slidesContainer.innerHTML = '';
            state.slides.forEach((slide, index) => {
                const isActive = index === state.currentIndex;
                const div = document.createElement('div');
                div.className = `slide-input-card rounded-2xl p-4 border-2 transition-all duration-300 ${isActive ? 'active' : 'bg-slate-50 border-transparent'}`;
                
                div.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[9px] font-black uppercase tracking-widest ${isActive ? 'text-indigo-600' : 'text-slate-400'}">Slide ${index + 1}</span>
                        <div class="flex items-center gap-3">
                            ${index > 0 ? `<button onclick="deleteSlide(${index})" class="text-slate-300 hover:text-rose-500"><i class="fa-solid fa-trash-can text-xs"></i></button>` : ''}
                        </div>
                    </div>
                    <textarea class="w-full bg-white border border-slate-100 text-slate-800 text-sm p-3 rounded-xl focus:ring-2 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none resize-none font-semibold mb-3" 
                        rows="2" placeholder="Konten slide...">${slide.title}</textarea>
                    
                    <div class="flex items-center justify-between border-t border-slate-100 pt-3">
                        <div class="flex items-center gap-3">
                            <label class="cursor-pointer flex items-center gap-1.5 text-[9px] font-black uppercase ${slide.image ? 'text-green-500' : 'text-slate-400'}">
                                <i class="fa-solid fa-image"></i> BG
                                <input type="file" class="hidden" accept="image/*" onchange="uploadImage(${index}, this)">
                            </label>
                            ${slide.image ? `<button onclick="removeImage(${index})" class="text-rose-400 text-[9px] font-black uppercase"><i class="fa-solid fa-xmark"></i></button>` : ''}
                        </div>
                        <div class="flex items-center gap-2">
                            <input type="checkbox" id="cta-${index}" class="peer hidden" onchange="toggleCTA(${index})" ${slide.isCTA ? 'checked' : ''}>
                            <label for="cta-${index}" class="cursor-pointer flex items-center gap-2 text-[9px] font-black uppercase text-slate-400 peer-checked:text-indigo-600 select-none">
                                <div class="w-4 h-4 border-2 border-slate-200 rounded flex items-center justify-center peer-checked:bg-indigo-600 peer-checked:border-indigo-600">
                                    <i class="fa-solid fa-check text-[8px] text-white"></i>
                                </div> CTA
                            </label>
                        </div>
                    </div>
                `;

                div.querySelector('textarea').addEventListener('input', (e) => {
                    state.slides[index].title = e.target.value;
                    renderPreview();
                });

                div.addEventListener('click', (e) => {
                    if (e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'INPUT' && !e.target.closest('button') && !e.target.closest('label')) {
                        jumpToSlide(index);
                    }
                });

                els.slidesContainer.appendChild(div);
            });
        }

        function jumpToSlide(index) {
            state.currentIndex = index;
            renderSlideInputs();
            renderPreview();
        }

        function uploadAvatar(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    state.avatar = e.target.result;
                    els.avatarPreview.src = state.avatar;
                    els.avatarPreview.classList.remove('hidden');
                    els.avatarPlaceholder.classList.add('hidden');
                    renderPreview();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function uploadImage(index, input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => { 
                    state.slides[index].image = e.target.result; 
                    renderSlideInputs(); 
                    renderPreview(); 
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function removeImage(index) {
            state.slides[index].image = null;
            renderSlideInputs();
            renderPreview();
        }

        function toggleCTA(index) {
            state.slides[index].isCTA = !state.slides[index].isCTA;
            renderPreview();
        }

        function addNewSlide() {
            state.slides.push({ title: "Poin Baru", image: null, isCTA: false });
            state.currentIndex = state.slides.length - 1;
            renderSlideInputs();
            renderPreview();
        }

        function deleteSlide(index) {
            state.slides.splice(index, 1);
            state.currentIndex = Math.min(state.currentIndex, state.slides.length - 1);
            renderSlideInputs();
            renderPreview();
        }

        function prevSlide() { if (state.currentIndex > 0) jumpToSlide(state.currentIndex - 1); }
        function nextSlide() { if (state.currentIndex < state.slides.length - 1) jumpToSlide(state.currentIndex + 1); }

        function setTheme(theme) {
            state.theme = theme;
            document.querySelectorAll('.theme-btn').forEach(btn => {
                const active = btn.dataset.theme === theme;
                btn.className = `theme-btn py-3 rounded-xl border-2 transition-all ${active ? 'active border-indigo-600 bg-indigo-50 text-indigo-600 font-black' : 'border-slate-100 bg-white text-slate-400 font-black'} text-[10px]`;
            });
            renderPreview();
        }

        function handleImportTXT(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const content = e.target.result;
                    const parts = content.split(';').map(p => p.trim()).filter(p => p.length > 0);
                    if (parts.length > 0) {
                        state.slides = parts.map((text, idx) => ({ title: text, image: null, isCTA: idx === parts.length - 1 }));
                        state.currentIndex = 0;
                        renderSlideInputs();
                        renderPreview();
                    }
                };
                reader.readAsText(input.files[0]);
            }
        }

        function renderPreview() {
            const slide = state.slides[state.currentIndex];
            if(!slide) return;
            
            const textRaw = slide.title.replace(/\n/g, '<br/>');
            const length = slide.title.length;
            let fontSize = state.theme === 'impact' ? 110 : (state.theme === 'elegant' ? 80 : 75);
            
            if (length > 20) fontSize *= 0.8;
            if (length > 50) fontSize *= 0.65;
            if (length > 100) fontSize *= 0.5;

            els.previewAuthor.innerText = state.author;
            els.slideTopCounter.innerText = `${state.currentIndex + 1} / ${state.slides.length}`;
            els.footerAvatarContainer.innerHTML = state.avatar ? `<img src="${state.avatar}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-user text-slate-300"></i>`;

            if (slide.image) {
                els.bgLayer.innerHTML = `<img src="${slide.image}" class="absolute inset-0 w-full h-full object-cover"><div class="absolute inset-0 bg-gradient-to-t from-black/90 via-black/30 to-transparent"></div>`;
                els.captureNode.style.color = '#ffffff'; 
                els.previewAuthor.style.color = '#ffffff';
            } else {
                els.bgLayer.innerHTML = '';
                els.captureNode.style.backgroundColor = state.bgColor;
                els.captureNode.style.color = state.textColor;
                els.previewAuthor.style.color = state.textColor;
            }

            if (slide.isCTA) {
                document.getElementById('counter-badge').style.opacity = '0';
                document.getElementById('footer-branding').style.opacity = '0';
                els.contentContainer.className = "absolute inset-0 z-20 flex flex-col items-center justify-center p-10 text-center font-sans";
                els.contentContainer.innerHTML = `
                    <div class="relative w-32 h-32 sm:w-44 sm:h-44 rounded-[2.5rem] p-1 bg-gradient-to-br from-indigo-500 to-rose-500 shadow-2xl mb-8">
                        <div class="w-full h-full rounded-[2.3rem] bg-white flex items-center justify-center overflow-hidden border-[6px] border-white">
                            ${state.avatar ? `<img src="${state.avatar}" class="w-full h-full object-cover">` : `<i class="fa-solid fa-user text-5xl opacity-10"></i>`}
                        </div>
                    </div>
                    <h2 class="text-2xl font-black mb-3 tracking-tighter" style="color: inherit">${state.author}</h2>
                    <p class="font-bold leading-tight max-w-[80%]" style="color: inherit; font-size: ${fontSize * 0.4}px">${textRaw}</p>
                    <div class="flex gap-8 mt-10 opacity-30">
                        <i class="fa-solid fa-heart text-2xl"></i>
                        <i class="fa-solid fa-comment text-2xl"></i>
                        <i class="fa-solid fa-bookmark text-2xl"></i>
                    </div>
                `;
            } else {
                document.getElementById('counter-badge').style.opacity = '1';
                document.getElementById('footer-branding').style.opacity = '1';
                els.contentContainer.className = "absolute inset-0 z-20 flex flex-col justify-end p-10 sm:p-16 pb-28 sm:pb-40 text-left";
                
                let fontClass = state.theme === 'modern' ? 'font-black tracking-tighter leading-[0.9] uppercase font-sans' : 
                                 state.theme === 'elegant' ? 'font-bold italic leading-[1.1] font-serif' : 
                                 'font-normal tracking-wide leading-[0.8] font-display';
                
                els.contentContainer.innerHTML = `<h1 class="${fontClass}" style="font-size: ${fontSize}px">${textRaw}</h1>`;
            }
        }

        async function downloadAllSlides() {
            els.loadingOverlay.style.display = 'flex';
            const originalIndex = state.currentIndex;
            try {
                for (let i = 0; i < state.slides.length; i++) {
                    state.currentIndex = i;
                    renderPreview();
                    await new Promise(r => setTimeout(r, 600)); 
                    const canvas = await html2canvas(els.captureNode, { scale: 2, useCORS: true, allowTaint: true });
                    const link = document.createElement('a');
                    link.download = `Slide-${i + 1}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                }
            } catch (err) { console.error(err); } 
            finally {
                state.currentIndex = originalIndex;
                renderPreview();
                els.loadingOverlay.style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
